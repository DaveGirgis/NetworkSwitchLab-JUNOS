site_name: Junos SP Training Labs
site_description: JNCIS-SP Lab Series — vJunos-router in GNS3
site_author: Network Training Lab
site_url: https://DaveGirgis.github.io/NetworkSwitchLab-JUNOS/

repo_name: DaveGirgis/NetworkSwitchLab-JUNOS
repo_url: https://github.com/DaveGirgis/NetworkSwitchLab-JUNOS
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - toc.integrate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - attr_list

